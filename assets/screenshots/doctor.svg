<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
  </defs>

  <!-- Outline Frame -->
  <rect width="700" height="450" rx="12" fill="url(#bg-grad)" stroke="#334155" stroke-width="1.5"/>

  <!-- Window Header -->
  <path d="M 0 12 A 12 12 0 0 1 12 0 L 688 0 A 12 12 0 0 1 700 12 L 700 40 L 0 40 Z" fill="#0f172a" opacity="0.8"/>
  <circle cx="25" cy="20" r="5" fill="#ef4444"/>
  <circle cx="41" cy="20" r="5" fill="#eab308"/>
  <circle cx="57" cy="20" r="5" fill="#22c55e"/>
  <text x="350" y="25" text-anchor="middle" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="12" font-weight="600" fill="#64748b">
    Terminal — assetflow doctor
  </text>

  <!-- Doctor Audit Console Screen Output -->
  <g transform="translate(40, 80)" font-family="SFMono-Regular, Consolas, Menlo, monospace" font-size="13" fill="#cbd5e1" xml:space="preserve">
    <!-- Exec command -->
    <text x="0" y="0" font-weight="bold" fill="#38bdf8">$ <tspan fill="#f1f5f9">assetflow doctor</tspan></text>
    <text x="0" y="20" fill="#34d399">✔ <tspan fill="#94a3b8">Audit check finished</tspan></text>

    <!-- Audit Header -->
    <text x="0" y="55" font-weight="bold" fill="#22d5ee">Project Image Audit</text>
    <text x="0" y="70" fill="#475569">──────────────────────────────────────────────────────────────────</text>

    <!-- Score & Stats -->
    <text x="0" y="95" font-weight="bold" fill="#f8fafc">Project Health Score:</text>
    <!-- Score Badge background -->
    <rect x="200" y="80" width="100" height="22" rx="4" fill="#1e3a8a" opacity="0.3"/>
    <text x="210" y="96" font-weight="900" fill="#38bdf8">88 / 100</text>
    
    <text x="0" y="125" font-weight="bold" fill="#cbd5e1">Scanned Images:<tspan fill="#f8fafc" x="200">250</tspan></text>
    <text x="0" y="145" font-weight="bold" fill="#cbd5e1">Total File Size:<tspan fill="#cbd5e1" x="200">89.3 MB</tspan></text>
    <text x="0" y="165" font-weight="bold" fill="#cbd5e1">Potential Savings:<tspan fill="#34d399" font-weight="bold" x="200">41.6 MB (47% reduction)</tspan></text>

    <!-- Top largest assets list -->
    <text x="0" y="205" font-weight="bold" fill="#22d5ee">Largest Assets (Top 3):</text>
    <text x="20" y="225" fill="#f8fafc">1. public/images/hero-home-background.png — <tspan fill="#ef4444">18.4 MB</tspan></text>
    <text x="20" y="245" fill="#f8fafc">2. assets/products/camera-detail.jpg — <tspan fill="#eab308">4.2 MB</tspan></text>
    <text x="20" y="265" fill="#f8fafc">3. src/logo/animation-frames.png — <tspan fill="#94a3b8">1.8 MB</tspan></text>

    <!-- Recommendations -->
    <text x="0" y="305" font-weight="bold" fill="#22d5ee">Recommendations:</text>
    <text x="20" y="325" fill="#eab308">• <tspan fill="#f1f5f9">Convert PNGs to WebP/AVIF to reduce file sizes (High Impact)</tspan></text>
    <text x="20" y="345" fill="#eab308">• <tspan fill="#f1f5f9">Compress files over 1MB with lower quality presets (Medium Impact)</tspan></text>
    <text x="20" y="365" fill="#eab308">• <tspan fill="#f1f5f9">Remove unneeded EXIF metadata from camera assets (Low Impact)</tspan></text>
  </g>
</svg>
