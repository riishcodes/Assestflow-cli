<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bg-grad)"/>
  
  <!-- Subtle decorative grid/circles -->
  <circle cx="950" cy="100" r="180" fill="#0284c7" opacity="0.08" filter="blur(40px)"/>
  <circle cx="200" cy="300" r="150" fill="#047857" opacity="0.05" filter="blur(40px)"/>
  
  <!-- Left Side: Branding & Logo -->
  <g transform="translate(80, 80)">
    <!-- Logo Symbol -->
    <g transform="translate(0, 10)">
      <path d="M0,40 L30,0 L60,40 L45,40 L30,20 L15,40 Z" fill="url(#primary-grad)"/>
      <path d="M20,60 L50,20 L80,60 L65,60 L50,40 L35,60 Z" fill="url(#accent-grad)" opacity="0.8"/>
    </g>
    
    <!-- Text -->
    <text x="100" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" fill="#f8fafc" letter-spacing="-1px">
      AssetFlow <tspan fill="#38bdf8">CLI</tspan>
    </text>
    <text x="100" y="75" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="500" fill="#94a3b8" letter-spacing="1px">
      PRODUCTION-GRADE IMAGE OPTIMIZATION ENGINE
    </text>
    
    <text x="0" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400" fill="#cbd5e1" width="400">
      Install once. Never think about image optimization again.
    </text>
  </g>

  <!-- Right Side: Benchmarks Dashboard Grid -->
  <g transform="translate(620, 60)">
    <!-- Card Base -->
    <rect width="500" height="280" rx="12" fill="url(#card-grad)" stroke="#475569" stroke-width="1" stroke-opacity="0.5"/>
    
    <!-- Card Title Bar -->
    <rect width="500" height="40" rx="12" fill="#1e293b" opacity="0.6"/>
    <circle cx="20" cy="20" r="6" fill="#ef4444"/>
    <circle cx="38" cy="20" r="6" fill="#eab308"/>
    <circle cx="56" cy="20" r="6" fill="#22c55e"/>
    <text x="80" y="25" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="13" font-weight="600" fill="#94a3b8">
      assetflow optimize --preset compression
    </text>

    <!-- Stats Matrix -->
    <g transform="translate(30, 70)">
      <!-- Metric 1: Images Count -->
      <g transform="translate(0, 0)">
        <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="0.5px">TOTAL IMAGES</text>
        <text x="0" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="800" fill="#f8fafc">250</text>
      </g>

      <!-- Metric 2: Reduction ratio -->
      <g transform="translate(220, 0)">
        <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="0.5px">SIZE REDUCTION</text>
        <text x="0" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="800" fill="#34d399">47%</text>
      </g>

      <!-- Metric 3: Size diff -->
      <g transform="translate(0, 100)">
        <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="0.5px">FILE SIZE DELTA</text>
        <text x="0" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#f8fafc">89.3 MB <tspan fill="#38bdf8" font-size="20">→</tspan> 47.7 MB</text>
      </g>

      <!-- Metric 4: Cache Speedup -->
      <g transform="translate(220, 100)">
        <text x="0" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#94a3b8" letter-spacing="0.5px">CACHED EXECUTION</text>
        <text x="0" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="800" fill="#38bdf8">57× <tspan fill="#64748b" font-size="16" font-weight="500">faster</tspan></text>
      </g>
    </g>
  </g>
</svg>
